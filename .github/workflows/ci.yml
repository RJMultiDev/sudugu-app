name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test-and-build:
    name: Test & build
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17

      - name: Cache Gradle
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: gradle-${{ runner.os }}-${{ hashFiles('**/*.gradle*', '**/gradle/libs.versions.toml') }}
          restore-keys: |
            gradle-${{ runner.os }}-

      - name: Run unit tests
        run: ./gradlew :composeApp:allTests :server:test

      - name: Compile all targets (sanity check)
        run: |
          ./gradlew :composeApp:compileCommonMainKotlinMetadata
          ./gradlew :composeApp:compileDebugKotlinAndroid
          ./gradlew :composeApp:compileKotlinDesktop
          ./gradlew :composeApp:compileKotlinWasmJs

      - name: Build Android APK (debug)
        run: ./gradlew :composeApp:assembleDebug

      - name: Build Desktop distribution
        run: ./gradlew :composeApp:packageDistributionForCurrentOS

      - name: Build Web distribution
        run: ./gradlew :composeApp:wasmJsBrowserDistribution

      - name: Build server
        run: ./gradlew :server:installDist

      - name: Upload Android APK
        uses: actions/upload-artifact@v4
        with:
          name: android-apk
          path: composeApp/build/outputs/apk/debug/composeApp-debug.apk
          if-no-files-found: warn

      - name: Upload Web distribution
        uses: actions/upload-artifact@v4
        with:
          name: web-dist
          path: composeApp/build/dist/js/productionExecutable/
          if-no-files-found: warn
